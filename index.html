<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja Strona</title>
    <style>
        /* Prosty, nowoczesny wygląd */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .button-container {
            margin-bottom: 30px;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 0 10px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #0056b3;
        }

        .content-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px
rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
            min-height: 100px;
        }

        /* Ukrywanie zawartości na starcie */
        .content {
            display: none;
        }

        /* Klasa pokazująca aktywną zawartość */
        .active {
            display: block;
        }
    </style>
</head>
<body>

    <div class="button-container">
        <button onclick="showContent('part1')">part 1</button>
        <button onclick="showContent('part2')">part 2</button>
        <button onclick="showContent('part3')">part 3</button>
    </div>

    <div class="content-box">
        
        <div id="default-text" class="content active">
            <p>Wybierz jedną z sekcji powyżej, aby zobaczyć zawartość.</p>
        </div>

        <div id="part1" class="content">
            <p>tekst 1</p> 
        </div>

        <div id="part2" class="content">
            <p>tekst 2</p>
        </div>

        <div id="part3" class="content">
            <p>tekst 3</p>
        </div>
        
    </div>

    <script>
        function showContent(id) {
            // Ukryj wszystkie teksty
            const contents = document.querySelectorAll('.content');
            contents.forEach(content => content.classList.remove('active'));
            
            // Pokaż tylko ten kliknięty
            document.getElementById(id).classList.add('active');
        }
    </script>

</body>
</html>
